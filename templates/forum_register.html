{% extends "base.html" %}

{% block title %}Forum Register{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='forum.css') }}">
{% endblock %}

{% block content %}
<div class="forum-auth-wrap">
    <div class="content-card forum-auth-card">
        <div class="content-card-header">
            <h2 class="content-card-title">Create Forum Account</h2>
        </div>
        <div class="content-card-body">
            {% if error %}
            <p class="forum-error">{{ error }}</p>
            {% endif %}
            <form method="post" action="/forum/register" class="forum-form-grid">
                <input class="forum-input" type="text" name="username" placeholder="Username" required>
                <input class="forum-input" type="password" name="password" placeholder="Password" required>
                <input class="forum-input" type="text" name="role" placeholder="Role (e.g., Analyst, Associate)" value="Analyst">
                <select class="forum-select" name="experience_level">
                    <option value="0-2 years">0-2 years</option>
                    <option value="3-5 years">3-5 years</option>
                    <option value="6-10 years">6-10 years</option>
                    <option value="10+ years">10+ years</option>
                </select>
                <button type="submit" class="btn btn-primary btn-sm">Register</button>
            </form>
            <p class="page-subtitle" style="margin-top:0.6rem;">Already have an account? <a href="/forum/login">Login</a>.</p>
        </div>
    </div>
</div>
{% endblock %}
