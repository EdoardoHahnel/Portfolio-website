<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portföljbolagen{% endblock %} - Nordic Private Equity Platform</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='Port.png') }}">
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='Port.png') }}">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='charts.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='pe_theme.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    {% block extra_css %}{% endblock %}
</head>
<body class="modern-layout pe-theme">
    
    <!-- News Ticker -->
    <div class="news-ticker-wrapper">
        <div class="news-ticker-container">
            <div class="news-ticker" id="newsTicker">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
    </div>
    
    <!-- Top Navigation Bar -->
    <nav class="top-nav pe-top-nav">
        <div class="top-nav-container pe-nav-shell">
            <div class="pe-nav-left">
                <button class="pe-mobile-toggle" id="peMobileMenuToggle" aria-label="Toggle menu" aria-expanded="false">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="brand pe-brand" onclick="window.location.href='/'">
                    <img src="{{ url_for('static', filename='Port.png') }}" alt="Portföljbolagen" class="pe-brand-logo">
                    <div class="pe-brand-text">
                        <span class="pe-brand-title">Portföljbolagen</span>
                        <span class="pe-brand-subtitle">Nordic Private Equity Intelligence</span>
                    </div>
                </div>
            </div>
            <div class="pe-nav-right" aria-label="Primary Navigation">
                <ul class="pe-nav-menu">
                    <li class="pe-nav-item">
                        <a href="/" class="pe-nav-link {% if request.path == '/' %}is-active{% endif %}">Dashboard</a>
                    </li>
                    <li class="pe-nav-item">
                        <a href="/pe-firms" class="pe-nav-link {% if request.path == '/pe-firms' %}is-active{% endif %}">PE Firms</a>
                    </li>
                    <li class="pe-nav-item">
                        <a href="/portfolio" class="pe-nav-link {% if request.path == '/portfolio' %}is-active{% endif %}">Portfolio</a>
                    </li>
                    <li class="pe-nav-item">
                        <a href="/news" class="pe-nav-link {% if request.path == '/news' %}is-active{% endif %}">News</a>
                    </li>
                    <li class="pe-nav-item">
                        <a href="/fundraising" class="pe-nav-link {% if request.path == '/fundraising' %}is-active{% endif %}">Fundraising</a>
                    </li>
                </ul>
            </div>
            
        </div>
    </nav>
    <div class="pe-mobile-overlay" id="peMobileOverlay" aria-hidden="true"></div>
    <aside class="pe-mobile-drawer" id="peMobileDrawer" aria-hidden="true">
        <div class="pe-mobile-drawer-header">
            <span class="pe-mobile-drawer-title">Menu</span>
            <button class="pe-mobile-drawer-close" id="peMobileDrawerClose" aria-label="Close menu">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <ul class="pe-mobile-drawer-menu">
            <li class="pe-mobile-drawer-item">
                <a href="/" class="pe-mobile-drawer-link {% if request.path == '/' %}is-active{% endif %}">Dashboard</a>
            </li>
            <li class="pe-mobile-drawer-item">
                <a href="/pe-firms" class="pe-mobile-drawer-link {% if request.path == '/pe-firms' %}is-active{% endif %}">PE Firms</a>
            </li>
            <li class="pe-mobile-drawer-item">
                <a href="/portfolio" class="pe-mobile-drawer-link {% if request.path == '/portfolio' %}is-active{% endif %}">Portfolio</a>
            </li>
            <li class="pe-mobile-drawer-item">
                <a href="/news" class="pe-mobile-drawer-link {% if request.path == '/news' %}is-active{% endif %}">News</a>
            </li>
            <li class="pe-mobile-drawer-item">
                <a href="/fundraising" class="pe-mobile-drawer-link {% if request.path == '/fundraising' %}is-active{% endif %}">Fundraising</a>
            </li>
        </ul>
    </aside>

    <!-- Main Content Area -->
    <main class="main-container">
        {% block content %}{% endblock %}
    </main>
    
    <script src="{{ url_for('static', filename='common.js') }}"></script>
    <script src="{{ url_for('static', filename='news_ticker.js') }}"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const toggle = document.getElementById('peMobileMenuToggle');
        const drawer = document.getElementById('peMobileDrawer');
        const overlay = document.getElementById('peMobileOverlay');
        const closeBtn = document.getElementById('peMobileDrawerClose');
        if (!toggle || !drawer || !overlay || !closeBtn) return;

        const isMobileWidth = function () {
            return window.innerWidth <= 768;
        };

        const setMenuOpen = function (open) {
            drawer.classList.toggle('is-open', open);
            overlay.classList.toggle('is-open', open);
            document.body.classList.toggle('pe-mobile-menu-open', open);
            drawer.setAttribute('aria-hidden', open ? 'false' : 'true');
            toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        };

        const closeMenu = function () {
            setMenuOpen(false);
        };

        toggle.addEventListener('click', function () {
            if (!isMobileWidth()) return;
            setMenuOpen(!drawer.classList.contains('is-open'));
        });

        closeBtn.addEventListener('click', closeMenu);
        overlay.addEventListener('click', closeMenu);

        drawer.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', closeMenu);
        });

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') closeMenu();
        });

        window.addEventListener('resize', function () {
            if (window.innerWidth > 768) closeMenu();
        });

        if (!isMobileWidth()) closeMenu();
    });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
